program: train.py 
command:
  - ${env}
  - python
  - ${program}
  - --project
  - fakenews-gnn
method: bayes  # or "grid" for exhaustive
metric:
  name: val_loss
  goal: minimize
parameters:
  num_layers:
    values: [2, 3, 4]
  hidden_channels:
    values: [32, 64, 128]
  conv_type:
    values: ["GCN", "GraphSAGE", "GAT"]
  dropout:
    min: 0.0
    max: 0.5
  use_batchnorm:
    values: [true, false]
  pooling:
    values: ["mean", "max", "add"]
  lr:
    min: 0.0001
    max: 0.01
  weight_decay:
    min: 0.0
    max: 0.01
  batch_size:
    values: [16, 32, 64]
  optimizer:
    values: ["Adam", "AdamW"]
  epochs:
    value: 25